<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipper - The Adventure Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="style.css?v=6">
    <style>
        /* Specific Adventure Hub Styles */
        .adventure-hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--c-electric-turquoise);
            overflow: hidden;
            text-align: center;
        }

        .adventure-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .adventure-hero .hero-bg-animate {
            background-image: url('hero-bg_wide.png');
            filter: saturate(1.2) contrast(1.1);
        }

        .adventure-content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            padding: 0 20px;
            color: var(--c-white);
        }

        .adventure-content h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            line-height: 1.1;
        }

        .adventure-content p {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .waitlist-cta {
            font-size: 1.25rem;
            padding: 18px 40px;
            border-radius: var(--radius-full);
            background: var(--c-amber);
            color: var(--c-text-dark);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 191, 0, 0.4);
        }

        .waitlist-cta:hover {
            transform: scale(1.05);
            background: var(--c-sunset-orange);
            color: white;
            box-shadow: 0 15px 40px rgba(255, 94, 0, 0.5);
        }

        button.waitlist-cta {
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .waitlist-form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
            width: 100%;
        }

        .waitlist-input {
            width: 100%;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: var(--radius-full, 50px);
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .waitlist-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .waitlist-input:focus {
            border-color: #00E5FF;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .waitlist-message {
            font-size: 1.1rem;
            min-height: 24px;
            font-weight: 500;
        }

        .adventure-grid-section {
            padding: 80px 20px;
            max-width: 1300px;
            margin: auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.5rem;
            color: var(--c-text-dark);
        }

        .adventure-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        @media(max-width: 900px) {
            .adventure-grid { grid-template-columns: 1fr; }
        }

        .grid-block {
            background: var(--c-white);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .grid-block h3 {
            font-size: 2rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .grid-item:hover { transform: translateX(10px); }

        .grid-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .grid-img {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .grid-text h4 { font-size: 1.2rem; color: var(--c-text-dark); transition: color 0.2s; }
        .grid-item:hover .grid-text h4 { color: var(--c-electric-turquoise-dark); }
        .grid-text p { font-size: 0.95rem; color: var(--c-text-muted); }

        .affiliate-section {
            background: var(--c-text-dark);
            padding: 80px 20px;
            color: white;
            text-align: center;
        }

        .affiliate-section .section-title {
            color: white;
            margin-bottom: 10px;
        }

        .affiliate-subtitle {
            font-size: 1.2rem;
            color: var(--c-electric-turquoise);
            margin-bottom: 50px;
        }
        
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i data-feather="anchor"></i> Skipper
        </div>

        <div class="user-actions desktop-only">
            <button class="btn btn-secondary">Log In</button>
            <button class="btn btn-primary btn-teal">Sign Up</button>
        </div>
    </nav>

    <main class="page-container">
        
        <!-- Adventure Hero -->
        <section class="adventure-hero">
            <div class="hero-bg-animate"></div>
            <div class="adventure-content">
                <h1>Your Voyage,<br>Fully Realized.</h1>
                <p>From route planning and weather intelligence to finding the perfect rental in any port—Skipper.com is your digital first mate.</p>
                <form id="waitlist-form" class="waitlist-form-container">
                    <input type="email" id="waitlist-email" placeholder="Enter your email address" required class="waitlist-input">
                    <button type="submit" class="waitlist-cta" id="waitlist-submit">Join the Waitlist for Summer 2026</button>
                    <div id="waitlist-message" class="waitlist-message"></div>
                </form>
            </div>
        </section>



    </main>

    <footer style="background-color: #0A1929; color: var(--c-white); padding: 40px 20px; text-align: center;">
        <p style="color: rgba(255,255,255,0.7);">&copy; 2026 Skipper Global Yacht Rentals. All Rights Reserved.</p>
    </footer>

    <script>
        feather.replace();

        document.getElementById('waitlist-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('waitlist-email').value;
            const msgEl = document.getElementById('waitlist-message');
            const submitBtn = document.getElementById('waitlist-submit');
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';
            msgEl.innerText = '';
            
            try {
                const res = await fetch('/api/waitlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if(res.ok) {
                    msgEl.style.color = '#00ffaa';
                    msgEl.innerText = data.message || 'Successfully joined!';
                    document.getElementById('waitlist-email').value = '';
                } else {
                    msgEl.style.color = '#ff6b6b';
                    msgEl.innerText = data.error || 'Failed to join. Please try again.';
                }
            } catch (err) {
                msgEl.style.color = '#ff6b6b';
                msgEl.innerText = 'Network error. Please try again later.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Join the Waitlist for Summer 2026';
            }
        });
    </script>
</body>
</html>
